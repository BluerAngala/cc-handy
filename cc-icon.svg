<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern colorful gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />   <!-- Indigo-600 -->
      <stop offset="50%" stop-color="#7C3AED" />  <!-- Blue-600 -->
      <stop offset="100%" stop-color="#2563EB" /> <!-- Indigo-700 -->
    </linearGradient>

    <!-- Inner glow/highlight for the 3D effect -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow for the central element -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    
    <!-- Light shadow for the text to pop -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Base App Icon Rounded Rectangle -->
  <rect width="1024" height="1024" rx="225" fill="url(#bgGrad)" />
  <rect width="1024" height="1024" rx="225" fill="url(#highlight)" />

  <!-- Group for the creative logo mark (Mic + Abstract waves) -->
  <g transform="translate(512, 420)" filter="url(#shadow)">
    
    <!-- Soundwave rings expanding outward -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="20" />
    <circle cx="0" cy="0" r="240" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="15" />
    
    <!-- Left abstract wave / voice line -->
    <path d="M -120,20 C -120,100 -80,140 0,140" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="35" stroke-linecap="round" />
    
    <!-- Right abstract wave / voice line -->
    <path d="M 120,-20 C 120,-100 80,-140 0,-140" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="35" stroke-linecap="round" />

    <!-- Central dynamic microphone capsule -->
    <rect x="-45" y="-90" width="90" height="180" rx="45" fill="#ffffff" />
    
    <!-- Mic capsule inner detail -->
    <rect x="-25" y="-70" width="50" height="60" rx="25" fill="#4F46E5" fill-opacity="0.1" />
  </g>

  <!-- Typography 'CC' positioned cleanly at the bottom -->
  <!-- Using letter-spacing and modern sans-serif stack -->
  <text 
    x="512" 
    y="820" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-size="160" 
    font-weight="800" 
    letter-spacing="5"
    fill="#ffffff" 
    text-anchor="middle" 
    filter="url(#textShadow)"
  >
    cc-handy
  </text>
</svg>