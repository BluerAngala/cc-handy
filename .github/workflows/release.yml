name: "Release"

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.ref_name }}',
              name: 'Handy ${{ github.ref_name }}',
              body: 'Release ${{ github.ref_name }}',
              draft: true,
              prerelease: false
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14"
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-14"
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            target: "x86_64-unknown-linux-gnu"
            args: "--bundles appimage"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            args: ""

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      release-id: ${{ needs.create-release.outputs.release_id }}
      asset-prefix: "handy"
      upload-artifacts: false
      sign-binaries: false
    secrets: inherit

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 即使部分构建失败，也发布已成功的构建
    if: always() && needs.create-release.result == 'success'
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            // 检查是否有任何构建成功上传了资源
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }}
            });

            // 如果有资源上传，则发布；否则保持 draft
            if (release.assets.length > 0) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-release.outputs.release_id }},
                draft: false
              });
              console.log(`Published release with ${release.assets.length} assets`);
            } else {
              console.log('No assets uploaded, keeping as draft');
              core.setFailed('No assets were successfully built');
            }
